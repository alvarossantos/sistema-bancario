{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                    <h3 class="fw-bold">Aceder à Conta</h3>
                    <p class="text-muted">Insira as suas credenciais seguras.</p>
                </div>
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control form-control-lg bg-light" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Palavra-passe</label>
                        <input type="password" name="senha" class="form-control form-control-lg bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill">Entrar no NexBank</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/cadastro" class="text-decoration-none">Ainda não é cliente? <strong>Abra a sua conta</strong></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
