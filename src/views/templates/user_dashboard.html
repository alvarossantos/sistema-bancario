{% extends 'base.html' %}
{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card text-white bg-primary shadow-lg border-0 rounded-4">
            <div class="card-body p-4 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title text-light mb-1">Saldo Disponível</h5>
                    <h1 class="display-4 fw-bold">R$ {{ "%.2f"|format(conta[5]) if conta else "0.00" }}</h1>
                </div>
                <div class="text-end">
                    <p class="mb-0">Agência: <strong>{{ conta[3] if conta else '---' }}</strong></p>
                    <p class="mb-0">Conta: <strong>{{ conta[2] if conta else '---' }}</strong></p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0 h-100 rounded-4">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h5 class="fw-bold"><i class="fas fa-money-bill-wave text-success me-2"></i>Operações de Caixa</h5>
            </div>
            <div class="card-body p-4">
                <form action="/operacoes" method="POST">
                    <input type="hidden" name="conta_id" value="{{ conta[0] if conta else '' }}">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Que operação deseja realizar?</label>
                        <select name="tipo" class="form-select bg-light" required>
                            <option value="DEPOSITO">Depósito</option>
                            <option value="SAQUE">Levantamento (Saque)</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Valor (R$)</label>
                        <input type="number" step="0.01" name="valor" class="form-control form-control-lg bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-outline-primary w-100 fw-bold rounded-pill" {% if not conta %}disabled{% endif %}>Confirmar Operação</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0 h-100 rounded-4 border-start border-warning border-4">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h5 class="fw-bold"><i class="fas fa-exchange-alt text-warning me-2"></i>Transferência</h5>
            </div>
            <div class="card-body p-4">
                <form action="/transferir" method="POST">
                    <input type="hidden" name="id_origem" value="{{ conta[0] if conta else '' }}">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">ID da Conta Destino</label>
                        <input type="number" name="id_destino" class="form-control bg-light" required>
                    </div>
                    
                    <div class="mb-3 p-3 bg-light rounded-3">
                        <label class="form-label fw-bold d-block mb-2">Método de Envio</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="metodo" value="PIX" checked>
                            <label class="form-check-label">Pix <span class="badge bg-success">Grátis</span></label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="metodo" value="TED">
                            <label class="form-check-label">TED <small class="text-danger">(Taxa: R$ 10,50)</small></label>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted">Valor a transferir (R$)</label>
                        <input type="number" step="0.01" name="valor" class="form-control form-control-lg bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-warning text-dark w-100 fw-bold rounded-pill shadow-sm" {% if not conta %}disabled{% endif %}>Transferir Agora</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
