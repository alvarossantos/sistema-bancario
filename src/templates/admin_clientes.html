{% extends 'base.html' %}
{% block content %}
<h2 class="my-4">Painel Administrativo - Clientes</h2>
<table class="table table-hover bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>CPF</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente.id }}</td>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.email }}</td>
            <td>{{ cliente.cpf }}</td>
            <td><span class="badge bg-success">Ativo</span></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
